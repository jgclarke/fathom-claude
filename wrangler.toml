name = "fathom-mcp"
main = "src/index.ts"
compatibility_date = "2025-03-01"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

# KV namespace for OAuth tokens and auth codes.
# Create the namespace in the Cloudflare dashboard, then set the real ID
# via a CI/CD secret or local override — never commit the real ID to the repo.
#   wrangler kv namespace create FATHOM_KV
#   wrangler kv namespace create FATHOM_KV --preview
# Then set CLOUDFLARE_KV_ID / CLOUDFLARE_KV_PREVIEW_ID in your CI secrets
# and substitute them at deploy time, or paste the IDs into a local
# wrangler.toml that is gitignored.
[[kv_namespaces]]
binding = "FATHOM_KV"
id = "REPLACE_WITH_KV_NAMESPACE_ID"
preview_id = "REPLACE_WITH_KV_PREVIEW_NAMESPACE_ID"
